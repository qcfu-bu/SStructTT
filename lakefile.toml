name = "SStructTT"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["SStructTT"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
maxHeartbeats = 0

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[require]]
name = "lean-autosubst"
git = "https://github.com/qcfu-bu/lean-autosubst.git"
rev = "main"

[[lean_lib]]
name = "SStructTT"
